<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Requirement 4: Balance display -->
    <header>
      <div id="balance-display">
        <span class="balance-label">Total Expense</span>
        <span class="balance-amount">$0.00</span>
      </div>
    </header>

    <main>
      <!-- Requirement 1: Add transaction form -->
      <section id="input-form">
        <h2>Add Transaction</h2>
        <form>
          <div class="field-group">
            <label for="item-name">Item Name</label>
            <input
              type="text"
              id="item-name"
              name="item"
              placeholder="e.g. Coffee"
              autocomplete="off"
            />
            <span class="error-msg" id="error-item"></span>
          </div>
          <div class="field-group">
            <label for="amount">Amount</label>
            <input
              type="number"
              id="amount"
              name="amount"
              min="0.01"
              step="0.01"
              placeholder="0.00"
            />
            <span class="error-msg" id="error-amount"></span>
          </div>
          <div class="field-group">
            <label for="category">Category</label>
            <select id="category" name="category">
              <option value="">-- Select category --</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
            <span class="error-msg" id="error-category"></span>
          </div>
          <button type="submit">Add Transaction</button>
        </form>
      </section>

      <!-- Requirement 9: Custom category manager -->
      <section id="category-manager">
        <h2>Add Custom Category</h2>
        <div class="field-group">
          <label for="custom-category">Category Name</label>
          <input
            type="text"
            id="custom-category"
            name="custom-category"
            placeholder="e.g. Healthcare"
            autocomplete="off"
          />
          <span class="error-msg" id="error-custom-category"></span>
        </div>
        <button type="button" id="add-category-btn">Add Category</button>
        <ul id="category-list" aria-label="Category list"></ul>
      </section>

      <!-- Requirements 2 & 3: Transaction list -->
      <section id="transaction-list-container">
        <div class="txlist-header">
          <h2>Transactions</h2>
          <!-- Requirement 11: Sort control (inline) -->
          <div id="sort-control">
            <label for="sort-select">Sort by</label>
            <select id="sort-select" name="sort">
              <option value="date-desc" selected>Date Added (Newest First)</option>
              <option value="amount-asc">Amount (Low to High)</option>
              <option value="amount-desc">Amount (High to Low)</option>
              <option value="category-asc">Category (A–Z)</option>
            </select>
          </div>
        </div>
        <ul id="transaction-list" aria-label="Transaction list">
          <!-- Transactions rendered here by js/app.js -->
        </ul>
      </section>

      <!-- Requirement 5: Spending chart -->
      <section id="chart-container">
        <h2>Spending by Category</h2>
        <canvas id="spending-chart" aria-label="Spending pie chart" role="img"></canvas>
        <p class="placeholder-text" id="chart-placeholder">
          No transactions yet — add one to see your spending chart.
        </p>
      </section>

      <!-- Requirement 10: Monthly summary -->
      <section id="monthly-summary">
        <h2>Monthly Summary</h2>
        <ul id="monthly-summary-list" aria-label="Monthly spending summary">
          <!-- Monthly rows rendered here by js/app.js -->
        </ul>
        <p class="placeholder-text" id="monthly-placeholder">
          No transactions yet — your monthly summary will appear here.
        </p>
      </section>
    </main>

    <!-- Requirement 5.5: Chart.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <!-- Requirement 7.3: Single JS file -->
    <script src="js/app.js"></script>
  </body>
</html>
